server:
  port: 8761

spring:
  application:
    name: eureka-server

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
  server:
    wait-time-in-ms-when-sync-empty: 0       # Arranca rapidísimo sin buscar réplicas
    eviction-interval-timer-in-ms: 10000     # Limpia servicios apagados cada 10 seg