spring.application.name=ms-notificaciones
server.port=8081

# ===============================
# CONFIGURACIÓN DE BASE DE DATOS (MySQL - XAMPP)
# ===============================
# Se conecta a la base de datos db_notificaciones en tu puerto 3307
spring.datasource.url=jdbc:mysql://localhost:3307/db_notificaciones?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# LOGS Y TRAZABILIDAD (Rúbrica IE 2.3.2)
# ===============================
logging.level.com.ms_notificaciones=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===============================
# EUREKA DISCOVERY
# ===============================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true