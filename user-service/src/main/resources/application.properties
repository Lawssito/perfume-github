spring.application.name=user-service

server.port=8088
# ===============================
# CONFIGURACIÓN DEL SERVIDOR
# ===============================

# ===============================
# CONFIGURACIÓN DE BASE DE DATOS (H2 - En Memoria)
# ===============================
# H2 permite persistencia real durante la ejecución sin configurar un servidor externo[cite: 55].
spring.datasource.url=jdbc:h2:mem:userdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=root
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Habilita la consola de H2 en el navegador (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# JPA / HIBERNATE
# ===============================
# Permite que las tablas se creen automáticamente a partir de las entidades[cite: 60].
spring.jpa.hibernate.ddl-auto=update

# Muestra y formatea el SQL en consola para validar las operaciones CRUD[cite: 152].
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# LOGS Y TRAZABILIDAD (Rúbrica IE 2.3.2)
# ===============================
# Configuración de logs estructurados con SLF4J para trazabilidad entre capas.
logging.level.com.user_service=INFO
# Permite ver los parámetros de las consultas SQL en los logs
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===============================
# CONFIGURACIÓN EUREKA
# ===============================
# Registro en el servidor de descubrimiento
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
