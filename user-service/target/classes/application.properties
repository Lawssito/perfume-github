spring.application.name=user-service
server.port=8088

# ===============================
# CONFIGURACIÓN DE BASE DE DATOS (MySQL - XAMPP)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3307/db_users?createDatabaseIfNotExist=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# (Hibernate detectará automáticamente que es MySQL, no hace falta el dialecto)

# ===============================
# LOGS Y TRAZABILIDAD
# ===============================
logging.level.com.user_service=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===============================
# CONFIGURACIÓN EUREKA
# ===============================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true