spring.application.name=user-service
# ===============================
# CONFIGURACIÓN DEL SERVIDOR
# ===============================
server.port=8080

# ===============================
# CONFIGURACIÓN DE BASE DE DATOS (Oracle SQL)
# ===============================
# Cambia 'xe' por el SID de tu base de datos si es diferente
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:xe
spring.datasource.username=TU_USUARIO
spring.datasource.password=TU_CONTRASEÑA
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ===============================
# JPA / HIBERNATE
# ===============================
# Dialecto específico para Oracle
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect

# Actualiza las tablas automáticamente según tus entidades (usar 'none' o 'validate' en producción)
spring.jpa.hibernate.ddl-auto=update

# Muestra el SQL en consola formateado para entender cómo Hibernate cruza las tablas
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# LOGS Y TRAZABILIDAD
# ===============================
# Nivel de log para tu paquete principal
logging.level.com.user_service=INFO

# Si quieres ver los parámetros exactos que se pasan a la BD en los logs de Hibernate
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Opcional: Guardar los logs en un archivo físico para revisarlos después
# logging.file.name=logs/user-service.log