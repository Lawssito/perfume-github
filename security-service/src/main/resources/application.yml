server:
  port: 8083

spring:
  application:
    name: security-service
  datasource:
    url: jdbc:mysql://localhost:3307/bd_security_service?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

security:
  internal-api-key: "${INTERNAL_API_KEY:a1b2c3d4-e5f6-7890-abcd-ef1234567890}"
  admin:
    default-user-id: 1  # ID de usuario que obtiene ROLE_ADMIN automaticamente (0 para deshabilitar)

jwt:
  secret: "${JWT_SECRET:1234567890123456789012345678901234567890123456789012345678901234}"

logging:
  level:
    root: INFO
    com.security_service: INFO

springdoc:
  swagger-ui:
    path: /swagger-ui.html
