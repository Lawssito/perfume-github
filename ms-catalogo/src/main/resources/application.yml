server:
  port: 8083

spring:
  application:
    name: ms-catalogo

datasource:
    # Conexión a tu MySQL en XAMPP usando el puerto 3307
    url: jdbc:mysql://localhost:3307/db_catalogo?createDatabaseIfNotExist=true
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver

jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

# ===============================
# LOGS Y TRAZABILIDAD (Rúbrica IE 2.3.2)
# ===============================
logging:
  level:
    com.ms_catalogo: INFO
    org.springframework.web: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# ===============================
# EUREKA DISCOVERY
# ===============================
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true